<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cloud Hearts Clock</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #fff;
}

body {
  display: flex;
  align-items: flex-start;
  justify-content: center;
}

/* 전체 위젯 */
.scale-wrap {
  position: relative;
  flex: 0 0 auto;
}

.clock {
  width: 270px;
  height: 150px;
  position: relative;
  overflow: hidden;
  border-radius: 28px;

  background:
    url("bg.png")
    center / cover
    no-repeat;

  border: 1.2px solid rgba(255, 255, 255, 0.9);

  box-shadow:
    0 8px 18px rgba(118, 145, 170, 0.14),
    inset 0 1px 2px rgba(255, 255, 255, 0.75);

  transform-origin: top left;
}

/* 시간 전체 묶음 */
.time {
  position: absolute;
  left: 50%;
  top: 43px;

  height: 62px;
  width: max-content;

  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2px;

  white-space: nowrap;

  filter:
    drop-shadow(0 2px 3px rgba(90, 115, 145, 0.14));

  transform:
    translateX(-50%)
    scale(var(--time-scale, 1));

  transform-origin: center center;
  transition: transform 0.18s ease;
}

/* 숫자 한 자리 공간 */
.digit-slot {
  position: relative;
  flex: 0 0 auto;

  width: 43px;
  height: 58px;

  margin: 0 -2px;
}

/* 숫자 이미지 */
.digit {
  position: absolute;
  inset: 0;

  width: 100%;
  height: 100%;
  object-fit: contain;

  display: block;

  opacity: 1;
  filter: blur(0);
  transform: translateY(0) scale(1);

  transition:
    opacity 0.26s ease,
    filter 0.26s ease,
    transform 0.26s ease;
}

/* 새 숫자가 처음 들어올 때 */
.digit.enter {
  opacity: 0;
  filter: blur(3px);
  transform: translateY(3px) scale(0.985);
}

/* 새 숫자 등장 */
.digit.enter.show {
  opacity: 1;
  filter: blur(0);
  transform: translateY(0) scale(1);
}

/* 기존 숫자 퇴장 */
.digit.leave {
  opacity: 0;
  filter: blur(3px);
  transform: translateY(-3px) scale(0.985);
}

/* 하트 콜론 */
.colon {
  display: flex;
  flex-direction: column;
  gap: 1px;

  margin: 0 3px 0 5px;
  transform: translateY(-2px);
}

.heart {
  width: 14px;
  height: auto;
  display: block;
}

/* am / pm */
.period-slot {
  position: relative;

  width: 43px;
  height: 29px;

  margin-left: 3px;
  transform: translateY(11px);

  flex: 0 0 auto;

  transition:
    width 0.18s ease,
    height 0.18s ease,
    margin-left 0.18s ease;
}

/* 12시처럼 전체 길이가 긴 경우 am/pm만 조금 작게 */
.time.wide-hour .period-slot {
  width: 34px;
  height: 23px;
  margin-left: 1px;
}

.period {
  position: absolute;
  inset: 0;

  width: 100%;
  height: 100%;
  object-fit: contain;

  opacity: 1;
  filter: blur(0);
  transform: translateY(0);

  transition:
    opacity 0.26s ease,
    filter 0.26s ease,
    transform 0.26s ease;
}

.period.enter {
  opacity: 0;
  filter: blur(3px);
  transform: translateY(2px);
}

.period.enter.show {
  opacity: 1;
  filter: blur(0);
  transform: translateY(0);
}

.period.leave {
  opacity: 0;
  filter: blur(3px);
  transform: translateY(-2px);
}
</style>
</head>

<body>
  <div class="scale-wrap" id="scaleWrap">
    <div class="clock" id="clock">
      <div class="time" id="time">

        <div class="digit-slot" data-position="0"></div>
        <div class="digit-slot" data-position="1"></div>

        <div class="colon">
          <img src="digits/heart.png" class="heart" alt="">
          <img src="digits/heart.png" class="heart" alt="">
        </div>

        <div class="digit-slot" data-position="2"></div>
        <div class="digit-slot" data-position="3"></div>

        <div class="period-slot" id="periodSlot"></div>
      </div>
    </div>
  </div>

<script>
const BASE_WIDTH = 270;
const BASE_HEIGHT = 150;
const OUTER_MARGIN = 6;

const DIGIT_PATH = number => `digits/${number}.png`;

const scaleWrap = document.getElementById("scaleWrap");
const clock = document.getElementById("clock");
const timeWrap = document.getElementById("time");
const digitSlots = [...document.querySelectorAll(".digit-slot")];
const periodSlot = document.getElementById("periodSlot");

let previousText = "";
let previousPeriod = "";

/* 이미지를 미리 불러와 순간적인 빈칸 방지 */
function preloadImages() {
  const sources = [
    ...Array.from({ length: 10 }, (_, i) => DIGIT_PATH(i)),
    "digits/heart.png",
    "digits/am.png",
    "digits/pm.png"
  ];

  sources.forEach(source => {
    const image = new Image();
    image.src = source;
  });
}

/* 기기별로 위젯 전체 비율 유지하며 축소 */
function resizeWidget() {
  const availableWidth = Math.max(
    1,
    document.documentElement.clientWidth - OUTER_MARGIN * 2
  );

  const availableHeight = Math.max(
    1,
    document.documentElement.clientHeight - OUTER_MARGIN * 2
  );

  const scale = Math.min(
    1,
    availableWidth / BASE_WIDTH,
    availableHeight / BASE_HEIGHT
  );

  clock.style.transform = `scale(${scale})`;
  scaleWrap.style.width = `${BASE_WIDTH * scale}px`;
  scaleWrap.style.height = `${BASE_HEIGHT * scale}px`;
}

/* 시간 전체가 넓을 때 카드 안에서 자동 축소 */
function fitTimeInsideClock() {
  timeWrap.style.setProperty("--time-scale", "1");

  requestAnimationFrame(() => {
    const maximumWidth = 246;
    const actualWidth = timeWrap.scrollWidth;

    const scale = Math.min(
      1,
      maximumWidth / actualWidth
    );

    timeWrap.style.setProperty(
      "--time-scale",
      String(scale)
    );
  });
}

/* 한 자리 숫자만 부드럽게 교체 */
function changeDigit(slot, number, animate = true) {
  const currentImage = slot.querySelector(".digit:not(.leave)");

  if (
    currentImage &&
    currentImage.dataset.value === number
  ) {
    return;
  }

  const newImage = document.createElement("img");
  newImage.src = DIGIT_PATH(number);
  newImage.alt = number;
  newImage.dataset.value = number;
  newImage.className = animate ? "digit enter" : "digit";

  slot.appendChild(newImage);

  if (!animate) {
    currentImage?.remove();
    return;
  }

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      newImage.classList.add("show");

      if (currentImage) {
        currentImage.classList.add("leave");
      }
    });
  });

  window.setTimeout(() => {
    currentImage?.remove();
    newImage.classList.remove("enter", "show");
  }, 300);
}

/* am / pm만 부드럽게 교체 */
function changePeriod(period, animate = true) {
  const currentImage =
    periodSlot.querySelector(".period:not(.leave)");

  if (
    currentImage &&
    currentImage.dataset.value === period
  ) {
    return;
  }

  const newImage = document.createElement("img");
  newImage.src = `digits/${period}.png`;
  newImage.alt = period;
  newImage.dataset.value = period;
  newImage.className = animate
    ? "period enter"
    : "period";

  periodSlot.appendChild(newImage);

  if (!animate) {
    currentImage?.remove();
    return;
  }

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      newImage.classList.add("show");

      if (currentImage) {
        currentImage.classList.add("leave");
      }
    });
  });

  window.setTimeout(() => {
    currentImage?.remove();
    newImage.classList.remove("enter", "show");
  }, 300);
}

function updateClock() {
  const now = new Date();

  const parts = new Intl.DateTimeFormat("en-US", {
    hour: "numeric",
    minute: "2-digit",
    hour12: true
  }).formatToParts(now);

  let hour = "12";
  let minute = "00";
  let period = "am";

  parts.forEach(part => {
    if (part.type === "hour") hour = part.value;
    if (part.type === "minute") minute = part.value;

    if (part.type === "dayPeriod") {
      period = part.value.toLowerCase();
    }
  });

  const text = hour.padStart(2, "0") + minute;
  timeWrap.classList.toggle("wide-hour", hour === "12");
  const firstRender = previousText === "";

  text.split("").forEach((number, index) => {
    changeDigit(
      digitSlots[index],
      number,
      !firstRender
    );
  });

  changePeriod(period, !firstRender);

  previousText = text;
  previousPeriod = period;

  fitTimeInsideClock();
}

preloadImages();
updateClock();
resizeWidget();

window.setInterval(updateClock, 1000);
window.addEventListener("resize", () => {
  resizeWidget();
  fitTimeInsideClock();
});

if ("ResizeObserver" in window) {
  const observer = new ResizeObserver(() => {
    resizeWidget();
    fitTimeInsideClock();
  });

  observer.observe(document.documentElement);
}
</script>
</body>
</html>
