<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clock</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
}

body {
  display: grid;
  place-items: center;
}

.clock {
  width: 210px;
  height: 98px;
  padding: 12px 14px;
  border-radius: 17px;

  background: rgba(168, 184, 202, 0.62);
  border: 1px solid rgba(255, 255, 255, 0.65);

  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.45),
    inset 0 -1px 0 rgba(255, 255, 255, 0.28),
    0 7px 20px rgba(95, 115, 135, 0.12);

  color: white;
  font-family: "Instrument Serif", Georgia, serif;
  overflow: hidden;
}

.time {
  font-size: 43px;
  line-height: 0.78;
  letter-spacing: -0.045em;
  white-space: nowrap;
  font-weight: 400;
}

.ampm {
  font-size: 31px;
  margin-left: 2px;
}

.day {
  margin-top: 8px;
  font-size: 14px;
  line-height: 0.78;
  text-transform: uppercase;
  font-weight: 600;
}

.date {
  font-size: 25px;
  line-height: 0.86;
  letter-spacing: -0.03em;
}
</style>
</head>

<body>
  <div class="clock">
    <div class="time">
      <span id="time">12:05</span><span id="ampm" class="ampm">pm</span>
    </div>
    <div id="day" class="day">SATURDAY</div>
    <div id="date" class="date">March 28</div>
  </div>

<script>
function updateClock() {
  const now = new Date();

  const timeParts = new Intl.DateTimeFormat("en-US", {
    hour: "numeric",
    minute: "2-digit",
    hour12: true
  }).formatToParts(now);

  let hour = "12";
  let minute = "00";
  let ampm = "";

  timeParts.forEach(function(part) {
    if (part.type === "hour") hour = part.value;
    if (part.type === "minute") minute = part.value;
    if (part.type === "dayPeriod") ampm = part.value.toLowerCase();
  });

  const day = new Intl.DateTimeFormat("en-US", {
    weekday: "long"
  }).format(now).toUpperCase();

  const date = new Intl.DateTimeFormat("en-US", {
    month: "long",
    day: "numeric"
  }).format(now);

  document.getElementById("time").textContent = hour + ":" + minute;
  document.getElementById("ampm").textContent = ampm;
  document.getElementById("day").textContent = day;
  document.getElementById("date").textContent = date;
}

updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
