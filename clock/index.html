<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cloud Hearts Clock</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#fff}
body{display:flex;align-items:center;justify-content:center}
.clock{width:270px;height:150px;position:relative;overflow:hidden;border-radius:28px;background:url("bg.png") center/cover no-repeat;border:1.2px solid rgba(255,255,255,.9);box-shadow:0 8px 18px rgba(118,145,170,.14),inset 0 1px 2px rgba(255,255,255,.75)}
.time{position:absolute;left:50%;top:43px;transform:translateX(-50%);height:62px;display:flex;align-items:center;justify-content:center;gap:2px;filter:drop-shadow(0 2px 3px rgba(90,115,145,.14));white-space:nowrap}
.digit{height:58px;width:auto;object-fit:contain;display:block;margin:0 -2px}
.colon{display:flex;flex-direction:column;gap:1px;margin:0 3px 0 5px;transform:translateY(-2px)}
.heart{width:14px;height:auto;display:block}
.pm{height:27px;width:auto;margin-left:5px;transform:translateY(11px);display:block}
@media (max-width:240px){.clock{width:230px;height:128px;border-radius:24px}.time{top:37px}.digit{height:49px}.heart{width:12px}.pm{height:22px;margin-left:3px;transform:translateY(9px)}}
</style>
</head>
<body>
<div class="clock">
  <div class="time" id="time"></div>
</div>
<script>
const DIGIT_PATH = n => `digits/${n}.png`;
function img(src, cls, alt){
  const el=document.createElement('img');
  el.src=src; el.className=cls; el.alt=alt || '';
  return el;
}
function renderTime(){
  const now=new Date();
  const parts=new Intl.DateTimeFormat('en-US',{hour:'numeric',minute:'2-digit',hour12:true}).formatToParts(now);
  let hour='12', minute='00', ap='pm';
  for(const p of parts){
    if(p.type==='hour') hour=p.value;
    if(p.type==='minute') minute=p.value;
    if(p.type==='dayPeriod') ap=p.value.toLowerCase();
  }
  const wrap=document.getElementById('time');
  wrap.innerHTML='';
  const text = hour.padStart(2,'0') + minute;
  wrap.appendChild(img(DIGIT_PATH(text[0]),'digit',text[0]));
  wrap.appendChild(img(DIGIT_PATH(text[1]),'digit',text[1]));
  const colon=document.createElement('div'); colon.className='colon';
  colon.appendChild(img('digits/heart.png','heart','heart'));
  colon.appendChild(img('digits/heart.png','heart','heart'));
  wrap.appendChild(colon);
  wrap.appendChild(img(DIGIT_PATH(text[2]),'digit',text[2]));
  wrap.appendChild(img(DIGIT_PATH(text[3]),'digit',text[3]));
  wrap.appendChild(img(`digits/${ap}.png`,'pm',ap));
}
renderTime();
setInterval(renderTime,1000);
</script>
</body>
</html>
