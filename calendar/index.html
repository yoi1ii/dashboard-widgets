<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Calendar Widget</title>

  <style>
    :root {
      --base-width: 470px;

      --blue: #8bb8ff;
      --blue-strong: #79aaf7;
      --blue-soft: #edf4ff;
      --blue-bar: #e2edff;

      --text: #2d3440;
      --muted: #8d95a3;
      --outside: #d1d6de;
      --border: #e5e9ef;

      /* 바깥 배경은 흰색이고, 회색은 그림자로만 보입니다. */
      --shadow:
        0 12px 28px rgba(74, 84, 102, 0.14),
        0 2px 8px rgba(74, 84, 102, 0.07);

      --radius: 26px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #ffffff;
      color-scheme: light;
    }

    body {
      color: var(--text);
      font-family:
        Inter, Pretendard, -apple-system, BlinkMacSystemFont,
        "SF Pro Display", "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    button,
    a {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    /*
      노션 임베드 영역입니다.
      영역이 작아져도 스크롤을 만들지 않고, 달력 전체를 같은 비율로 축소합니다.
    */
    .viewport {
      width: 100%;
      height: 100%;
      padding: 10px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow: hidden;
      background: #ffffff;
    }

    /*
      transform으로 줄인 위젯의 실제 표시 크기만큼 자리를 잡아 주는 틀입니다.
      덕분에 잘리거나 스크롤이 생기지 않습니다.
    */
    .stage {
      position: relative;
      flex: 0 0 auto;
      width: var(--base-width);
      min-height: 1px;
    }

    .widget {
      position: absolute;
      top: 0;
      left: 0;
      width: var(--base-width);
      margin: 0;
      padding: 16px 14px 14px;

      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);

      overflow: hidden;
      transform-origin: top left;
      visibility: hidden;
    }

    .widget.ready {
      visibility: visible;
    }

    .header {
      display: grid;
      grid-template-columns: 42px 1fr 42px;
      align-items: center;
      gap: 8px;
      padding: 2px 4px 14px;
    }

    .nav-btn {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      color: #6f7887;
      background: #ffffff;
      border-radius: 50%;
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .nav-btn:hover {
      background: #f7f9fc;
      transform: translateY(-1px);
    }

    .nav-btn:active {
      transform: scale(0.96);
    }

    .nav-btn svg {
      width: 21px;
      height: 21px;
    }

    .month-wrap {
      text-align: center;
    }

    .month {
      margin: 0;
      color: var(--blue-strong);
      font-size: 28px;
      line-height: 1.05;
      font-weight: 760;
      letter-spacing: -0.7px;
    }

    .year {
      margin-top: 7px;
      color: #737b89;
      font-size: 15px;
      font-weight: 650;
      letter-spacing: 0.15px;
    }

    .divider {
      height: 1px;
      margin: 0 7px 12px;
      background: var(--border);
    }

    .weekdays,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
    }

    .weekdays {
      padding: 0 3px 10px;
      color: #69717f;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
    }

    .calendar-grid {
      position: relative;
      grid-auto-rows: 61px;
      padding: 0 3px;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .calendar-grid.leaving-left {
      opacity: 0;
      transform: translateX(-12px);
    }

    .calendar-grid.leaving-right {
      opacity: 0;
      transform: translateX(12px);
    }

    .day {
      position: relative;
      min-width: 0;
      appearance: none;
      -webkit-appearance: none;
      border: 0;
      background: transparent;

      display: flex;
      align-items: flex-start;
      justify-content: center;

      padding-top: 8px;
      color: var(--text);
      font-size: 16px;
      font-weight: 620;
      cursor: default;
      user-select: none;
    }

    .day.outside {
      color: var(--outside);
    }

    .day.clickable {
      cursor: pointer;
    }

    .day-number {
      position: absolute;
      z-index: 4;
      top: 7px;
      left: 50%;

      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;

      border-radius: 50%;
      line-height: 1;
      transform: translateX(-50%);
      transition:
        background 0.18s ease,
        color 0.18s ease,
        transform 0.18s ease,
        box-shadow 0.18s ease;
    }

    .day.clickable:hover .day-number {
      background: var(--blue-soft);
      color: var(--blue-strong);
      transform: translateX(-50%) scale(1.03);
    }

    .day.today .day-number,
    .day.today:hover .day-number {
      background: var(--blue);
      color: #ffffff;
      transform: translateX(-50%) scale(1.03);
      box-shadow: 0 5px 14px rgba(123, 171, 245, 0.25);
    }

    .event-dot {
      position: absolute;
      z-index: 5;
      left: 50%;
      bottom: 10px;

      width: 5px;
      height: 5px;
      border-radius: 50%;

      transform: translateX(-50%);
      background: var(--blue-strong);
    }

    .multi-bar {
      position: absolute;
      z-index: 2;
      height: 30px;
      background: var(--blue-bar);
      pointer-events: none;
      opacity: 0.96;
    }

    .multi-bar.start {
      border-radius: 10px 0 0 10px;
    }

    .multi-bar.end {
      border-radius: 0 10px 10px 0;
    }

    .multi-bar.single-row {
      border-radius: 10px;
    }

    .event-popup {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: none;
      place-items: center;
      padding: 22px;
      background: rgba(245, 248, 252, 0.72);
      backdrop-filter: blur(4px);
    }

    .event-popup.open {
      display: grid;
    }

    .popup-card {
      width: min(100%, 360px);
      max-height: 72%;
      padding: 18px;
      overflow: auto;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 18px 46px rgba(74, 84, 102, 0.18);
      animation: popupIn 0.18s ease;
    }

    @keyframes popupIn {
      from {
        opacity: 0;
        transform: translateY(7px) scale(0.98);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .popup-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .popup-date {
      color: var(--blue-strong);
      font-size: 15px;
      font-weight: 760;
    }

    .popup-close {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #7d8795;
      background: #f6f8fb;
      font-size: 18px;
      line-height: 1;
    }

    .popup-list {
      display: grid;
    }

    .popup-event {
      min-height: 44px;
      padding: 9px 4px;
      display: grid;
      grid-template-columns: 8px minmax(0, 1fr) auto;
      align-items: center;
      gap: 9px;
      border-top: 1px solid #eef0f4;
      color: inherit;
      text-decoration: none;
    }

    .popup-event:first-child {
      border-top: 0;
    }

    .popup-event:hover {
      background: #fafcff;
    }

    .popup-bullet {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--blue-strong);
    }

    .popup-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 700;
    }

    .popup-time {
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
    }

    .status {
      min-height: 12px;
      margin: 8px 5px 0;
      color: #a0a7b2;
      font-size: 10px;
      text-align: right;
    }

    .status:empty {
      display: none;
    }
  </style>
</head>

<body>
  <div class="viewport" id="viewport">
    <div class="stage" id="stage">
      <main class="widget" id="widget" aria-label="월간 일정 캘린더">
        <header class="header">
          <button class="nav-btn" id="prevBtn" aria-label="이전 달">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path
                d="M15 18l-6-6 6-6"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>

          <div class="month-wrap">
            <h1 class="month" id="monthLabel"></h1>
            <div class="year" id="yearLabel"></div>
          </div>

          <button class="nav-btn" id="nextBtn" aria-label="다음 달">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path
                d="M9 18l6-6-6-6"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </header>

        <div class="divider"></div>

        <div class="weekdays" aria-hidden="true">
          <span>S</span>
          <span>M</span>
          <span>T</span>
          <span>W</span>
          <span>T</span>
          <span>F</span>
          <span>S</span>
        </div>

        <section class="calendar-grid" id="calendarGrid"></section>

        <div
          class="event-popup"
          id="eventPopup"
          aria-hidden="true"
        >
          <div
            class="popup-card"
            role="dialog"
            aria-modal="true"
            aria-labelledby="popupDate"
          >
            <div class="popup-head">
              <div class="popup-date" id="popupDate"></div>
              <button
                class="popup-close"
                id="popupClose"
                type="button"
                aria-label="닫기"
              >
                ×
              </button>
            </div>

            <div class="popup-list" id="popupList"></div>
          </div>
        </div>

        <div class="status" id="status"></div>
      </main>
    </div>
  </div>

  <script>
    const CONFIG = {
      /* calendar 폴더 기준으로 루트의 events.json을 읽습니다. */
      API_URL: "../events.json",
      LOCALE: "en-US"
    };

    const BASE_WIDTH = 470;

    const monthNames = [
      "January",
      "February",
      "March",
      "April",
      "May",
      "June",
      "July",
      "August",
      "September",
      "October",
      "November",
      "December"
    ];

    const weekdayNames = [
      "Sun",
      "Mon",
      "Tue",
      "Wed",
      "Thu",
      "Fri",
      "Sat"
    ];

    const viewport = document.getElementById("viewport");
    const stage = document.getElementById("stage");
    const widget = document.getElementById("widget");

    const grid = document.getElementById("calendarGrid");
    const monthLabel = document.getElementById("monthLabel");
    const yearLabel = document.getElementById("yearLabel");
    const eventPopup = document.getElementById("eventPopup");
    const popupDate = document.getElementById("popupDate");
    const popupList = document.getElementById("popupList");
    const popupClose = document.getElementById("popupClose");
    const status = document.getElementById("status");

    const today = startOfDay(new Date());

    let viewDate = new Date(
      today.getFullYear(),
      today.getMonth(),
      1
    );

    let events = [];
    let fitFrame = 0;

    document
      .getElementById("prevBtn")
      .addEventListener("click", () => changeMonth(-1));

    document
      .getElementById("nextBtn")
      .addEventListener("click", () => changeMonth(1));

    popupClose.addEventListener("click", closeEventPopup);

    eventPopup.addEventListener("click", (event) => {
      if (event.target === eventPopup) {
        closeEventPopup();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeEventPopup();
      }
    });

    function startOfDay(date) {
      return new Date(
        date.getFullYear(),
        date.getMonth(),
        date.getDate()
      );
    }

    function parseLocalDate(value) {
      if (!value) {
        return null;
      }

      const text = String(value).slice(0, 10);
      const parts = text.split("-").map(Number);

      if (
        parts.length !== 3 ||
        parts.some((number) => !Number.isFinite(number))
      ) {
        return null;
      }

      const [year, month, day] = parts;
      return new Date(year, month - 1, day);
    }

    function getTimeFromValue(value) {
      if (!value || typeof value !== "string") {
        return "";
      }

      const match = value.match(/T(\d{2}:\d{2})/);
      return match ? match[1] : "";
    }

    function sameDate(first, second) {
      return (
        first.getFullYear() === second.getFullYear() &&
        first.getMonth() === second.getMonth() &&
        first.getDate() === second.getDate()
      );
    }

    function normalizeEvent(raw) {
      const dateObject =
        raw.date &&
        typeof raw.date === "object" &&
        !Array.isArray(raw.date)
          ? raw.date
          : null;

      const startValue =
        raw.start ||
        dateObject?.start ||
        raw.date;

      const endValue =
        raw.end ||
        dateObject?.end ||
        startValue;

      const start = parseLocalDate(startValue);
      const end = parseLocalDate(endValue);

      if (!start || !end || end < start) {
        return null;
      }

      return {
        id:
          raw.id ||
          `${raw.title || "event"}-${String(startValue)}`,

        title:
          raw.title ||
          raw.name ||
          "Untitled",

        start,
        end,

        time:
          raw.time ||
          getTimeFromValue(startValue),

        url:
          raw.url ||
          raw.pageUrl ||
          "#"
      };
    }

    async function loadEvents() {
      status.textContent = "Loading…";

      try {
        const response = await fetch(
          CONFIG.API_URL,
          { cache: "no-store" }
        );

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        const list = Array.isArray(data)
          ? data
          : Array.isArray(data.events)
            ? data.events
            : [];

        events = list
          .map(normalizeEvent)
          .filter(Boolean);

        status.textContent = "";
      } catch (error) {
        console.error(error);
        events = [];
        status.textContent = "Could not load events";
      }

      render();
    }

    function changeMonth(delta) {
      const directionClass =
        delta > 0
          ? "leaving-left"
          : "leaving-right";

      grid.classList.add(directionClass);

      window.setTimeout(() => {
        viewDate = new Date(
          viewDate.getFullYear(),
          viewDate.getMonth() + delta,
          1
        );

        closeEventPopup();
        render();
        grid.classList.remove(directionClass);
      }, 160);
    }

    function getCalendarDates(year, month) {
      const first = new Date(year, month, 1);

      const start = new Date(
        year,
        month,
        1 - first.getDay()
      );

      return Array.from(
        { length: 42 },
        (_, index) =>
          new Date(
            start.getFullYear(),
            start.getMonth(),
            start.getDate() + index
          )
      );
    }

    function eventsOn(date) {
      return events.filter(
        (event) =>
          date >= event.start &&
          date <= event.end
      );
    }

    function hasSingleDayEvent(date) {
      return eventsOn(date).some(
        (event) =>
          sameDate(event.start, event.end)
      );
    }

    function getMultiDayEventsForVisibleRange(dates) {
      const rangeStart = dates[0];
      const rangeEnd = dates[dates.length - 1];

      return events.filter(
        (event) =>
          !sameDate(event.start, event.end) &&
          event.end >= rangeStart &&
          event.start <= rangeEnd
      );
    }

    function render() {
      const year = viewDate.getFullYear();
      const month = viewDate.getMonth();
      const dates = getCalendarDates(year, month);

      monthLabel.textContent = monthNames[month];
      yearLabel.textContent = year;

      grid.innerHTML = "";

      dates.forEach((date) => {
        const day = document.createElement("button");
        day.type = "button";
        day.className = "day clickable";

        if (date.getMonth() !== month) {
          day.classList.add("outside");
        }

        if (sameDate(date, today)) {
          day.classList.add("today");
        }

        day.setAttribute(
          "aria-label",
          `${date.getFullYear()}-${date.getMonth() + 1}-${date.getDate()}`
        );

        const number = document.createElement("span");
        number.className = "day-number";
        number.textContent = date.getDate();

        day.appendChild(number);

        if (hasSingleDayEvent(date)) {
          const dot = document.createElement("span");
          dot.className = "event-dot";
          day.appendChild(dot);
        }

        const dayEvents = eventsOn(date)
          .sort((first, second) =>
            (first.time || "99:99").localeCompare(
              second.time || "99:99"
            )
          );

        if (dayEvents.length) {
          day.classList.add("clickable");

          day.addEventListener("click", () => {
            if (dayEvents.length === 1) {
              openEvent(dayEvents[0]);
              return;
            }

            showEventPopup(date, dayEvents);
          });
        }

        grid.appendChild(day);
      });

      renderMultiBars(dates);
      scheduleFit();
    }

    function renderMultiBars(dates) {
      const dayElements = [
        ...grid.querySelectorAll(".day")
      ];

      const multiEvents =
        getMultiDayEventsForVisibleRange(dates);

      multiEvents.forEach((event) => {
        for (let row = 0; row < 6; row += 1) {
          const rowStartIndex = row * 7;
          const rowEndIndex = rowStartIndex + 6;

          const rowStartDate = dates[rowStartIndex];
          const rowEndDate = dates[rowEndIndex];

          const segmentStart =
            event.start > rowStartDate
              ? event.start
              : rowStartDate;

          const segmentEnd =
            event.end < rowEndDate
              ? event.end
              : rowEndDate;

          if (segmentStart > segmentEnd) {
            continue;
          }

          const startIndex = dates.findIndex(
            (date) => sameDate(date, segmentStart)
          );

          const endIndex = dates.findIndex(
            (date) => sameDate(date, segmentEnd)
          );

          if (startIndex < 0 || endIndex < 0) {
            continue;
          }

          const startElement = dayElements[startIndex];
          const endElement = dayElements[endIndex];

          const bar = document.createElement("span");
          bar.className = "multi-bar";

          const startsHere =
            sameDate(segmentStart, event.start);

          const endsHere =
            sameDate(segmentEnd, event.end);

          if (startsHere && endsHere) {
            bar.classList.add("single-row");
          } else {
            if (startsHere) {
              bar.classList.add("start");
            }

            if (endsHere) {
              bar.classList.add("end");
            }
          }

          /*
            getBoundingClientRect 대신 offset 값을 사용합니다.
            그래서 위젯 전체에 scale이 적용돼도 막대 위치가 틀어지지 않습니다.
          */
          const cellWidth = startElement.offsetWidth;
          const edgeInset = Math.min(
            8,
            cellWidth * 0.14
          );

          const left =
            startElement.offsetLeft +
            edgeInset;

          const right =
            endElement.offsetLeft +
            endElement.offsetWidth -
            edgeInset;

          const top =
            startElement.offsetTop +
            10;

          bar.style.left = `${left}px`;
          bar.style.top = `${top}px`;
          bar.style.width =
            `${Math.max(20, right - left)}px`;

          grid.appendChild(bar);
        }
      });
    }

    function openEvent(event) {
      if (!event?.url || event.url === "#") {
        return;
      }

      window.open(
        event.url,
        "_blank",
        "noopener,noreferrer"
      );
    }

    function showEventPopup(date, dayEvents) {
      popupDate.textContent =
        `${monthNames[date.getMonth()].slice(0, 3)} ` +
        `${date.getDate()} · ${weekdayNames[date.getDay()]}`;

      popupList.innerHTML = "";

      dayEvents.forEach((event) => {
        const link = document.createElement("a");
        link.className = "popup-event";
        link.href = event.url;
        link.target = "_blank";
        link.rel = "noopener noreferrer";

        const bullet = document.createElement("span");
        bullet.className = "popup-bullet";

        const title = document.createElement("span");
        title.className = "popup-title";
        title.textContent = event.title;

        const time = document.createElement("span");
        time.className = "popup-time";
        time.textContent = event.time || "";

        link.append(bullet, title, time);
        popupList.appendChild(link);
      });

      eventPopup.classList.add("open");
      eventPopup.setAttribute("aria-hidden", "false");
      scheduleFit();
    }

    function closeEventPopup() {
      eventPopup.classList.remove("open");
      eventPopup.setAttribute("aria-hidden", "true");
    }

    /*
      핵심:
      가로와 세로 중 더 부족한 쪽에 맞춰 전체 위젯을 같은 비율로 축소합니다.
      따라서 노션 임베드 크기가 작아져도 위젯 일부가 잘리거나 스크롤이 생기지 않습니다.
    */
    function fitWidget() {
      const viewportStyle =
        window.getComputedStyle(viewport);

      const horizontalPadding =
        parseFloat(viewportStyle.paddingLeft) +
        parseFloat(viewportStyle.paddingRight);

      const verticalPadding =
        parseFloat(viewportStyle.paddingTop) +
        parseFloat(viewportStyle.paddingBottom);

      const availableWidth = Math.max(
        1,
        viewport.clientWidth - horizontalPadding
      );

      const availableHeight = Math.max(
        1,
        viewport.clientHeight - verticalPadding
      );

      const naturalHeight = Math.max(
        1,
        widget.scrollHeight
      );

      const scale = Math.min(
        1,
        availableWidth / BASE_WIDTH,
        availableHeight / naturalHeight
      );

      widget.style.transform =
        `scale(${scale})`;

      stage.style.width =
        `${BASE_WIDTH * scale}px`;

      stage.style.height =
        `${naturalHeight * scale}px`;

      widget.classList.add("ready");
    }

    function scheduleFit() {
      window.cancelAnimationFrame(fitFrame);

      fitFrame = window.requestAnimationFrame(() => {
        fitWidget();
      });
    }

    window.addEventListener(
      "resize",
      scheduleFit
    );

    if ("ResizeObserver" in window) {
      const widgetObserver =
        new ResizeObserver(scheduleFit);

      widgetObserver.observe(widget);
    }

    if (document.fonts?.ready) {
      document.fonts.ready.then(scheduleFit);
    }

    loadEvents();
  </script>
</body>
</html>
